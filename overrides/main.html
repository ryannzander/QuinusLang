{% extends "base.html" %}

{% block extrahead %}
{{ super() }}
<style>
/* Force sidebar visible on desktop - inline to guarantee load on GitHub Pages */
@media screen and (min-width: 76.25em) {
  .md-sidebar--primary {
    position: fixed !important;
    left: 0 !important;
    top: 2.4rem !important;
    width: 18.4rem !important;
    height: calc(100vh - 2.4rem) !important;
    transform: none !important;
    visibility: visible !important;
    opacity: 1 !important;
    display: block !important;
    z-index: 1;
  }
  .md-sidebar--secondary {
    position: fixed !important;
    right: 0 !important;
    top: 2.4rem !important;
    width: 18.4rem !important;
    height: calc(100vh - 2.4rem) !important;
    transform: none !important;
    visibility: visible !important;
    opacity: 1 !important;
    display: block !important;
    z-index: 1;
  }
  .md-content {
    margin-left: 18.4rem !important;
    margin-right: 18.4rem !important;
  }
  .md-overlay { display: none !important; }
}
</style>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function(){
  if(window.matchMedia("(min-width: 76.25em)").matches){
    var d=document.getElementById("__drawer");
    if(d)d.checked=true;
  }
  document.body.setAttribute("data-md-color-scheme","slate");
  document.body.setAttribute("data-md-color-primary","indigo");
  document.body.setAttribute("data-md-color-accent","indigo");
})();
</script>
{% endblock %}
