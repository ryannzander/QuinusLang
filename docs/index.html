  <h1>QuinusLang</h1>
  <p>A systems programming language with assembly-level control and readable syntax. Compiles to C, then to native executables.</p>

  <h2>Quick Start</h2>
  <pre><code>quinus init
quinus run</code></pre>

  <h2>Installation</h2>
  <pre><code>cargo install --path .</code></pre>
