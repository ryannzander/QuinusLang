name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and build dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list
          sudo apt-get update
          sudo apt-get install -y build-essential libxml2-dev llvm-18-dev libclang-18-dev zlib1g-dev libzstd-dev libncurses-dev
          echo "LLVM_SYS_181_PREFIX=/usr/lib/llvm-18" >> $GITHUB_ENV
          echo "/usr/lib/llvm-18/bin" >> $GITHUB_PATH
          /usr/lib/llvm-18/bin/llvm-config --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Build
        run: cargo run --release -- build
