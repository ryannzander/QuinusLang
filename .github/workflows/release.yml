name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install LLVM 17
        shell: pwsh
        run: |
          choco install llvm --version=17.0.6 -y --allow-downgrade
          if (-not $?) { throw "Chocolatey LLVM install failed" }

      - name: Setup LLVM environment
        shell: pwsh
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
          $llvmPath = "C:\Program Files\LLVM"
          if (-not (Test-Path "$llvmPath\bin\llvm-config.exe")) {
            Write-Host "LLVM not found at $llvmPath. Searching..."
            $found = Get-ChildItem -Path "C:\Program Files" -Filter "llvm-config.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $llvmPath = $found.Directory.Parent.FullName; Write-Host "Found at $llvmPath" }
            else { throw "LLVM 17 not found. llvm-sys requires llvm-config.exe. Install path: $llvmPath" }
          }
          "LLVM_SYS_170_PREFIX=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LLVM_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "$llvmPath\bin" >> $env:GITHUB_PATH
          Write-Host "LLVM_SYS_170_PREFIX=$llvmPath"

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Version: $version"

      - name: Update version in Cargo.toml
        shell: pwsh
        run: |
          # Only replace package version (X.Y.Z), not dependency versions like clap "4"
          (Get-Content Cargo.toml) -replace 'version = "\d+\.\d+\.\d+"', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - name: Update version in installer.iss
        shell: pwsh
        run: |
          (Get-Content installer.iss) -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$env:VERSION`"" | Set-Content installer.iss

      - name: Build
        env:
          LLVM_SYS_170_PREFIX: "C:/Program Files/LLVM"
        run: cargo build --release

      - name: Build runtime
        run: .\scripts\build-runtime.ps1

      - name: Copy LLVM tools
        shell: pwsh
        run: |
          Copy-Item "$env:LLVM_PATH\bin\lld-link.exe" "lld-link.exe" -Force
          Copy-Item "dist-runtime\runtime.obj" "runtime.obj" -Force

      - name: Create installer
        shell: pwsh
        run: .\build-installer.ps1

      - name: Create portable zip
        shell: pwsh
        run: .\make-portable.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/QuinusLang-Setup-*.exe
            QuinusLang-portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
