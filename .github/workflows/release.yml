name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install LLVM 18
        shell: pwsh
        run: |
          $llvmPath = "C:\LLVM"
          $archive = "$env:TEMP\llvm-18.1.8.tar.xz"
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-pc-windows-msvc.tar.xz" -OutFile $archive -UseBasicParsing
          New-Item -ItemType Directory -Path $llvmPath -Force | Out-Null
          tar -xf $archive -C $llvmPath --strip-components=1
          if (-not (Test-Path "$llvmPath\bin\llvm-config.exe")) { throw "LLVM install failed: llvm-config.exe not found" }
          "LLVM_SYS_181_PREFIX=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LLVM_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$llvmPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "LLVM installed at $llvmPath"

      - name: Install libxml2 (needed by LLVM static linking)
        shell: pwsh
        run: |
          vcpkg install libxml2:x64-windows-static
          $vcpkgRoot = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static"
          Get-ChildItem "$vcpkgRoot\lib\*.lib" | ForEach-Object { Write-Host "Found: $($_.Name)" }
          Copy-Item "$vcpkgRoot\lib\libxml2.lib" "C:\LLVM\lib\libxml2s.lib" -Force
          Write-Host "libxml2 installed"

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Version: $version"

      - name: Update version in Cargo.toml
        shell: pwsh
        run: |
          # Only replace package version (X.Y.Z), not dependency versions like clap "4"
          (Get-Content Cargo.toml) -replace 'version = "\d+\.\d+\.\d+"', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - name: Update version in installer.iss
        shell: pwsh
        run: |
          (Get-Content installer.iss) -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$env:VERSION`"" | Set-Content installer.iss

      - name: Build
        env:
          LLVM_SYS_181_PREFIX: "C:/LLVM"
        run: cargo build --release

      - name: Build runtime
        shell: pwsh
        run: |
          $env:PATH = "C:\LLVM\bin;$env:PATH"
          $clang = Get-Command clang -ErrorAction SilentlyContinue
          if ($clang) {
            Write-Host "Found clang: $($clang.Source)"
          } else {
            Write-Host "clang not found, listing C:\LLVM\bin:"
            Get-ChildItem "C:\LLVM\bin\clang*" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
          }
          New-Item -ItemType Directory -Force -Path "dist-runtime" | Out-Null
          Write-Host "Compiling runtime..."
          & "C:\LLVM\bin\clang.exe" -c -O2 -fno-exceptions -o "dist-runtime\runtime.obj" "runtime\runtime.c" 2>&1
          if ($LASTEXITCODE -ne 0) { throw "Runtime compilation failed with exit code $LASTEXITCODE" }
          Write-Host "Runtime compiled successfully"

      - name: Copy LLVM tools
        shell: pwsh
        run: |
          Copy-Item "$env:LLVM_PATH\bin\lld-link.exe" "lld-link.exe" -Force
          Copy-Item "dist-runtime\runtime.obj" "runtime.obj" -Force

      - name: Create installer
        shell: pwsh
        run: .\build-installer.ps1

      - name: Create portable zip
        shell: pwsh
        run: .\make-portable.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/QuinusLang-Setup-*.exe
            QuinusLang-portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
