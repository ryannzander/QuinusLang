name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install LLVM 17
        run: choco install llvm --version=17.0.6 -y --allow-downgrade --ia "/D=C:\LLVM"

      - name: Set LLVM env for build
        shell: pwsh
        run: |
          "LLVM_SYS_170_PREFIX=C:\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LLVM_PATH=C:\LLVM" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Version: $version"

      - name: Update version in Cargo.toml
        shell: pwsh
        run: |
          # Only replace package version (X.Y.Z), not dependency versions like clap "4"
          (Get-Content Cargo.toml) -replace 'version = "\d+\.\d+\.\d+"', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - name: Update version in installer.iss
        shell: pwsh
        run: |
          (Get-Content installer.iss) -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$env:VERSION`"" | Set-Content installer.iss

      - name: Build
        run: cargo build --release

      - name: Build runtime
        run: .\scripts\build-runtime.ps1

      - name: Copy LLVM tools
        shell: pwsh
        run: |
          Copy-Item "$env:LLVM_PATH\bin\lld-link.exe" "lld-link.exe" -Force
          Copy-Item "dist-runtime\runtime.obj" "runtime.obj" -Force

      - name: Create installer
        shell: pwsh
        run: .\build-installer.ps1

      - name: Create portable zip
        shell: pwsh
        run: .\make-portable.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/QuinusLang-Setup-*.exe
            QuinusLang-portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
