name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install 7-Zip
        run: choco install 7zip -y

      - name: Install LLVM 17
        shell: pwsh
        run: |
          $llvmPath = "C:\LLVM"
          $archive = "$env:TEMP\llvm-17.0.6.7z"
          Invoke-WebRequest -Uri "https://github.com/vovkos/llvm-package-windows/releases/download/llvm-17.0.6/llvm-17.0.6-windows-amd64-msvc17-msvcrt.7z" -OutFile $archive -UseBasicParsing
          New-Item -ItemType Directory -Path $llvmPath -Force | Out-Null
          & "C:\Program Files\7-Zip\7z.exe" x $archive -o"$llvmPath" -y
          $extracted = Get-ChildItem $llvmPath -Directory | Select-Object -First 1
          if ($extracted) { Move-Item "$($extracted.FullName)\*" $llvmPath -Force; Remove-Item $extracted.FullName -Force }
          if (-not (Test-Path "$llvmPath\bin\llvm-config.exe")) { throw "LLVM install failed: llvm-config.exe not found at $llvmPath\bin" }
          "LLVM_SYS_170_PREFIX=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "LLVM_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "$llvmPath\bin" >> $env:GITHUB_PATH
          Write-Host "LLVM installed at $llvmPath"

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace '^refs/tags/v', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Version: $version"

      - name: Update version in Cargo.toml
        shell: pwsh
        run: |
          # Only replace package version (X.Y.Z), not dependency versions like clap "4"
          (Get-Content Cargo.toml) -replace 'version = "\d+\.\d+\.\d+"', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - name: Update version in installer.iss
        shell: pwsh
        run: |
          (Get-Content installer.iss) -replace '#define MyAppVersion "[^"]+"', "#define MyAppVersion `"$env:VERSION`"" | Set-Content installer.iss

      - name: Build
        env:
          LLVM_SYS_170_PREFIX: "C:/LLVM"
        run: cargo build --release

      - name: Build runtime
        run: .\scripts\build-runtime.ps1

      - name: Copy LLVM tools
        shell: pwsh
        run: |
          Copy-Item "$env:LLVM_PATH\bin\lld-link.exe" "lld-link.exe" -Force
          Copy-Item "dist-runtime\runtime.obj" "runtime.obj" -Force

      - name: Create installer
        shell: pwsh
        run: .\build-installer.ps1

      - name: Create portable zip
        shell: pwsh
        run: .\make-portable.ps1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer_output/QuinusLang-Setup-*.exe
            QuinusLang-portable.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
